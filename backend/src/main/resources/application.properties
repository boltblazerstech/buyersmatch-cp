# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Zoho
zoho.client.id=${ZOHO_CLIENT_ID}
zoho.client.secret=${ZOHO_CLIENT_SECRET}
zoho.refresh.token=${ZOHO_REFRESH_TOKEN}
zoho.base.url=https://www.zohoapis.com.au/crm/v2
zoho.auth.url=https://accounts.zoho.com.au/oauth/v2/token

# Scheduler
spring.task.scheduling.enabled=true

# CORS
frontend.url=${FRONTEND_URL}

# Email (SMTP)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
mail.from.name=${MAIL_FROM_NAME}
admin.notify.email=${ADMIN_NOTIFY_EMAIL}

# Cloudflare R2
r2.account.id=${R2_ACCOUNT_ID}
r2.access.key=${R2_ACCESS_KEY}
r2.secret.key=${R2_SECRET_KEY}
r2.bucket.name=${R2_BUCKET_NAME}
r2.public.url=${R2_PUBLIC_URL}

# Logging (production-ready)
logging.level.root=INFO
logging.level.com.buyersmatch=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
